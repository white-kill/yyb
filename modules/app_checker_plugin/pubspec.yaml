name: app_checker_plugin
description: Flutter plugin for checking if apps are installed and getting app information.
version: 1.0.0
homepage: https://github.com/yourusername/app_checker_plugin

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.app_checker_plugin
        pluginClass: AppCheckerPlugin

