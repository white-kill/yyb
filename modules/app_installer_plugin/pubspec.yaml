name: app_installer_plugin
description: Flutter plugin for downloading and installing APK files with progress callbacks.
version: 1.0.0
homepage: https://github.com/yourusername/app_installer_plugin

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.2
  path_provider: ^2.1.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.app_installer_plugin
        pluginClass: AppInstallerPlugin

